<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # PHP preview files in projects — allow direct access
    <Directory /var/www/html/collabchat/projects>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # WebSocket proxy — chat notifications (ws_server.js port 8081)
    # Clients connect via ws://HOST:8081 directly; this proxy path is a fallback
    # for reverse-proxy setups (e.g. Traefik/Nginx in front)
    ProxyPreserveHost On
    ProxyPass        /ws  ws://localhost:8081
    ProxyPassReverse /ws  ws://localhost:8081

    # WebSocket proxy — terminal (terminal_ws.js port 8083)
    ProxyPass        /terminal-ws  ws://localhost:8083
    ProxyPassReverse /terminal-ws  ws://localhost:8083

    # Logs
    ErrorLog  /var/log/braintrust/apache-error.log
    CustomLog /var/log/braintrust/apache-access.log combined
</VirtualHost>
